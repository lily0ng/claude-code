<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Black circle background -->
  <circle cx="100" cy="100" r="100" fill="#0d0d0d"/>

  <!-- Outer hexagon -->
  <polygon
    points="100,18 172,59 172,141 100,182 28,141 28,59"
    fill="none"
    stroke="#cc2222"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Inner hexagon (rotated) -->
  <polygon
    points="100,42 148,70 148,130 100,158 52,130 52,70"
    fill="none"
    stroke="#991111"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Cube lines: vertical center -->
  <line x1="100" y1="42"  x2="100" y2="100" stroke="#cc2222" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="100" y2="158" stroke="#661111" stroke-width="2"/>

  <!-- Cube lines: top-left to center -->
  <line x1="52"  y1="70"  x2="100" y2="100" stroke="#cc2222" stroke-width="2.5"/>
  <!-- Cube lines: top-right to center -->
  <line x1="148" y1="70"  x2="100" y2="100" stroke="#cc2222" stroke-width="2.5"/>

  <!-- Cube lines: bottom-left -->
  <line x1="52"  y1="130" x2="100" y2="100" stroke="#661111" stroke-width="2"/>
  <!-- Cube lines: bottom-right -->
  <line x1="148" y1="130" x2="100" y2="100" stroke="#661111" stroke-width="2"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="6" fill="#cc2222"/>
  <circle cx="100" cy="100" r="3" fill="#ff2222"/>

  <!-- Outer hex to inner hex connectors (top corners) -->
  <line x1="100" y1="18" x2="100" y2="42"  stroke="#cc2222" stroke-width="2"/>
  <line x1="172" y1="59" x2="148" y2="70"  stroke="#cc2222" stroke-width="2"/>
  <line x1="172" y1="141" x2="148" y2="130" stroke="#881111" stroke-width="2"/>
  <line x1="100" y1="182" x2="100" y2="158" stroke="#881111" stroke-width="2"/>
  <line x1="28"  y1="141" x2="52"  y2="130" stroke="#881111" stroke-width="2"/>
  <line x1="28"  y1="59"  x2="52"  y2="70"  stroke="#cc2222" stroke-width="2"/>
</svg>
